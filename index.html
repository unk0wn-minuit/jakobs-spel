<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Jakobs Spel 🎮</title>
<style>
:root{
  --bg0:#050008;--bg1:#0b0014;--bg2:#120022;
  --p0:#7b2cff;--p1:#b56cff;--p2:#3a00b7;
  --w:#f5f0ff;--m:#c9b9ff;--d:#8a7bc2;
  --line:rgba(181,108,255,.18);
  --glass:rgba(12,6,24,.55);--glass2:rgba(12,6,24,.35);
  --shadow:0 12px 40px rgba(0,0,0,.55);
  --shadow2:0 10px 30px rgba(123,44,255,.18);h
  --r:18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg0);color:var(--w);overflow-x:hidden;}
.bg{position:fixed;inset:0;z-index:-1;}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(123,44,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(123,44,255,.07) 1px,transparent 1px);background-size:40px 40px;}
.bg-noise{position:absolute;inset:0;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);animation:drift 18s ease-in-out infinite alternate;}
.bg-orb.o1{width:600px;height:600px;top:-200px;left:-200px;background:radial-gradient(circle,rgba(123,44,255,.25),transparent 70%);}
.bg-orb.o2{width:400px;height:400px;bottom:-100px;right:-100px;background:radial-gradient(circle,rgba(58,0,183,.3),transparent 70%);animation-delay:-9s;}
.bg-orb.o3{width:300px;height:300px;top:40%;left:60%;background:radial-gradient(circle,rgba(181,108,255,.15),transparent 70%);animation-delay:-4s;}
@keyframes drift{0%{transform:translate(0,0) scale(1);}100%{transform:translate(40px,30px) scale(1.1);}}
.toastContainer{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.toast{background:var(--glass);border:1px solid var(--line);border-radius:12px;padding:12px 20px;color:var(--w);font-size:14px;backdrop-filter:blur(20px);animation:toastIn .3s ease;box-shadow:var(--shadow);pointer-events:none;}
@keyframes toastIn{from{transform:translateX(100px);opacity:0;}to{transform:none;opacity:1;}}
.topbar{position:fixed;top:0;left:0;right:0;z-index:500;height:64px;display:flex;align-items:center;padding:0 16px;gap:12px;background:rgba(5,0,8,.88);border-bottom:1px solid var(--line);backdrop-filter:blur(20px);}
.menuBtn{width:44px;height:44px;background:none;border:1px solid var(--line);border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;flex-shrink:0;transition:background .2s;}
.menuBtn:hover{background:rgba(123,44,255,.2);}
.menuBtn span{display:block;width:20px;height:2px;background:var(--p1);border-radius:2px;}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo{width:40px;height:40px;border-radius:12px;overflow:hidden;background:linear-gradient(135deg,var(--p2),var(--p0));display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;}
.logo img{width:100%;height:100%;object-fit:cover;}
.logoEmoji{font-size:22px;}
.logoInner{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.spark{position:absolute;border-radius:50%;background:var(--p1);animation:sparkle 2s ease-in-out infinite;}
.spark.s2{width:4px;height:4px;top:6px;right:8px;animation-delay:-.7s;}
.spark.s3{width:3px;height:3px;bottom:8px;left:6px;animation-delay:-1.4s;}
@keyframes sparkle{0%,100%{opacity:.2;transform:scale(.8);}50%{opacity:1;transform:scale(1.3);}}
.brandText{display:flex;flex-direction:column;line-height:1.1;}
.brandText .title{font-size:16px;font-weight:800;color:var(--w);}
.brandText .sub{font-size:11px;color:var(--d);}
.topRight{display:flex;align-items:center;gap:8px;margin-left:auto;}
.coinBadge{display:flex;align-items:center;gap:4px;background:rgba(123,44,255,.2);border:1px solid var(--line);border-radius:20px;padding:6px 12px;cursor:pointer;font-size:13px;font-weight:700;transition:background .2s;}
.coinBadge:hover{background:rgba(123,44,255,.35);}
.levelBadge{font-size:11px;color:var(--d);white-space:nowrap;}
.xpBar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;width:60px;margin-top:2px;}
.xpBarFill{height:100%;background:linear-gradient(90deg,var(--p0),var(--p1));border-radius:2px;transition:width .5s ease;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:40px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.pill.ghost{background:none;border:1px solid var(--line);color:var(--m);}
.pill.ghost:hover{background:rgba(123,44,255,.15);border-color:var(--p0);}
.pill.primary{background:linear-gradient(135deg,var(--p0),var(--p2));color:#fff;box-shadow:var(--shadow2);}
.pill.primary:hover{opacity:.9;transform:translateY(-1px);}
.pill.danger{background:linear-gradient(135deg,#ff2d55,#8b0000);color:#fff;}
.pill.danger:hover{opacity:.9;}
.sideOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;opacity:0;pointer-events:none;transition:opacity .3s;}
.sideOverlay.open{opacity:1;pointer-events:all;}
.sidebar{position:fixed;top:0;left:-360px;bottom:0;width:300px;background:rgba(8,2,18,.98);border-right:1px solid var(--line);z-index:700;display:flex;flex-direction:column;transition:left .3s cubic-bezier(.4,0,.2,1);backdrop-filter:blur(30px);}
.sidebar.open{left:0;}
.sideHead{padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);flex-shrink:0;}
.sideHead h3{font-size:15px;font-weight:700;color:var(--w);}
.closeBtn{width:30px;height:30px;border-radius:8px;background:none;border:1px solid var(--line);color:var(--m);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.closeBtn:hover{background:rgba(123,44,255,.2);}
.sideNavList{display:flex;flex-direction:column;padding:8px;gap:2px;flex-shrink:0;}
.sideNavBtn{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:12px;background:none;border:none;color:var(--m);cursor:pointer;font-size:15px;font-weight:600;text-align:left;transition:all .2s;width:100%;}
.sideNavBtn:hover{background:rgba(123,44,255,.15);color:var(--w);}
.sideNavBtn.active{background:rgba(123,44,255,.25);color:var(--w);border:1px solid rgba(123,44,255,.4);}
.sideNavIcon{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.sideNavLabel{font-size:15px;}
.sideContent{flex:1;overflow-y:auto;padding:10px;}
.sideContent::-webkit-scrollbar{width:4px;}
.sideContent::-webkit-scrollbar-track{background:transparent;}
.sideContent::-webkit-scrollbar-thumb{background:var(--p2);border-radius:2px;}
.sidePanel{display:none;}
.sidePanel.active{display:block;}
.sideSection{margin-bottom:18px;}
.sideSection h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--d);margin-bottom:8px;}
.favItem{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:12px;background:rgba(123,44,255,.08);border:1px solid var(--line);margin-bottom:5px;cursor:pointer;transition:background .2s;}
.favItem:hover{background:rgba(123,44,255,.18);}
.favItemName{font-size:13px;color:var(--m);font-weight:500;}
.themeGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.themeCard{padding:12px 8px;border-radius:12px;border:2px solid var(--line);cursor:pointer;text-align:center;transition:all .2s;}
.themeCard:hover{border-color:var(--p0);}
.themeCard.active{border-color:var(--p1);background:rgba(123,44,255,.2);}
.themeColor{width:28px;height:28px;border-radius:50%;margin:0 auto 6px;}
.themeCard p{font-size:11px;color:var(--m);}
.sugForm{display:flex;flex-direction:column;gap:8px;}
.sugForm input,.sugForm textarea,.formInput{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:10px;padding:10px 12px;color:var(--w);font-size:13px;font-family:inherit;width:100%;}
.sugForm textarea{resize:vertical;min-height:70px;}
.sugForm input::placeholder,.sugForm textarea::placeholder,.formInput::placeholder{color:var(--d);}
.sugForm input:focus,.sugForm textarea:focus,.formInput:focus{outline:none;border-color:var(--p0);}
.questCard{border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:8px;background:rgba(123,44,255,.06);}
.questName{font-size:13px;font-weight:700;margin-bottom:3px;}
.questDesc{font-size:11px;color:var(--d);margin-bottom:7px;}
.questProg{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:5px;}
.questProgFill{height:100%;background:linear-gradient(90deg,var(--p0),var(--p1));border-radius:2px;transition:width .5s;}
.questReward{font-size:11px;color:var(--p1);}
.questDone{color:#7fffb3;font-size:11px;font-weight:700;}
.shopGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.shopItem{border:1px solid var(--line);border-radius:12px;padding:10px 8px;text-align:center;background:rgba(123,44,255,.06);}
.shopItem.owned{border-color:var(--p1);background:rgba(123,44,255,.15);}
.shopEmoji{font-size:24px;margin-bottom:5px;}
.shopName{font-size:11px;font-weight:700;margin-bottom:3px;}
.shopPrice{font-size:10px;color:var(--p1);}
.settRow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line);}
.settRow:last-child{border:none;}
.settLabel{font-size:13px;color:var(--m);}
.toggle{width:42px;height:22px;border-radius:11px;background:rgba(255,255,255,.15);border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0;}
.toggle.on{background:var(--p0);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .25s;}
.toggle.on::after{left:23px;}
.profileBox{display:flex;flex-direction:column;align-items:center;padding:16px 0 10px;}
.profileAvatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p0));display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:10px;position:relative;cursor:pointer;border:3px solid var(--p1);overflow:hidden;}
.profileAvatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.profileAvatarHover{position:absolute;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;font-size:12px;color:#fff;border-radius:50%;}
.profileAvatar:hover .profileAvatarHover{display:flex;}
.profileName{font-size:16px;font-weight:800;color:var(--w);margin-bottom:3px;}
.profileSub{font-size:12px;color:var(--d);margin-bottom:12px;}
.profileStats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;margin-bottom:12px;}
.statBox{background:rgba(123,44,255,.1);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center;}
.statVal{font-size:16px;font-weight:800;color:var(--p1);}
.statLbl{font-size:10px;color:var(--d);}
.adminCard{background:rgba(255,0,0,.08);border:1px solid rgba(255,50,50,.25);border-radius:12px;padding:12px;margin-bottom:8px;}
.adminCard h4{font-size:12px;color:#ff6b6b;margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;}
.adminList{display:flex;flex-direction:column;gap:6px;}
.adminUserRow{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.08);}
.adminUserName{flex:1;font-size:13px;font-weight:600;}
.adminUserCoins{font-size:11px;color:var(--p1);}
.chatOverlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:800;display:none;align-items:center;justify-content:center;}
.chatOverlay.open{display:flex;}
.chatBox{width:400px;height:520px;background:rgba(8,2,18,.98);border:1px solid var(--line);border-radius:var(--r);display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(30px);}
.chatHead{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.chatHead h3{font-size:14px;font-weight:700;}
.chatMessages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;}
.chatMessages::-webkit-scrollbar{width:4px;}
.chatMessages::-webkit-scrollbar-thumb{background:var(--p2);border-radius:2px;}
.chatMsg{max-width:82%;padding:9px 13px;border-radius:14px;font-size:13px;line-height:1.4;}
.chatMsg.own{align-self:flex-end;background:linear-gradient(135deg,var(--p0),var(--p2));color:#fff;border-radius:14px 14px 4px 14px;}
.chatMsg.other{align-self:flex-start;background:rgba(255,255,255,.08);border:1px solid var(--line);color:var(--m);border-radius:14px 14px 14px 4px;}
.chatMsg .chatUser{font-size:10px;font-weight:700;margin-bottom:2px;opacity:.75;}
.chatInputRow{padding:10px 14px;border-top:1px solid var(--line);display:flex;gap:8px;flex-shrink:0;}
.chatInputRow input{flex:1;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:20px;padding:8px 14px;color:var(--w);font-size:13px;font-family:inherit;}
.chatInputRow input::placeholder{color:var(--d);}
.chatInputRow input:focus{outline:none;border-color:var(--p0);}
.main{padding-top:64px;}
.hero{padding:36px 24px 20px;text-align:center;}
.hero h1{font-size:clamp(26px,5vw,50px);font-weight:900;background:linear-gradient(135deg,var(--w),var(--p1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;}
.hintRow{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.hintPill{background:rgba(123,44,255,.15);border:1px solid var(--line);border-radius:20px;padding:5px 13px;font-size:11px;color:var(--m);}
.filterBar{display:flex;gap:8px;padding:0 24px 14px;overflow-x:auto;scrollbar-width:none;}
.filterBar::-webkit-scrollbar{display:none;}
.filterBtn{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid var(--line);background:none;color:var(--m);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.filterBtn:hover{background:rgba(123,44,255,.15);color:var(--w);}
.filterBtn.active{background:linear-gradient(135deg,var(--p0),var(--p2));color:#fff;border-color:transparent;}
.searchWrap{padding:0 24px 14px;position:relative;}
.searchWrap input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:14px;padding:11px 16px 11px 42px;color:var(--w);font-size:14px;font-family:inherit;}
.searchWrap input::placeholder{color:var(--d);}
.searchWrap input:focus{outline:none;border-color:var(--p0);}
.searchWrap::before{content:'🔍';position:absolute;left:36px;top:50%;transform:translateY(-50%);font-size:14px;}
.gamesGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;padding:0 24px 24px;}
.gameCard{border-radius:14px;background:var(--glass);border:1px solid var(--line);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;display:flex;flex-direction:column;}
.gameCard:hover{transform:translateY(-4px);box-shadow:var(--shadow2);border-color:rgba(181,108,255,.4);}
.gameCard.locked .gameThumb::after{content:'🔒';position:absolute;top:6px;right:8px;font-size:13px;}
.gameThumb{height:90px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.gameThumbBg{position:absolute;inset:0;opacity:.85;}
.gameThumbLetter{font-size:32px;font-weight:900;color:rgba(255,255,255,.9);position:relative;z-index:1;text-shadow:0 2px 8px rgba(0,0,0,.4);letter-spacing:-1px;font-family:'Segoe UI',sans-serif;}
.gameInfo{padding:9px 10px 8px;}
.gameName{font-size:12px;font-weight:700;color:var(--w);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.gameActions{display:flex;gap:4px;align-items:center;}
.favBtn{background:none;border:1px solid var(--line);border-radius:6px;cursor:pointer;font-size:13px;padding:3px 7px;transition:all .2s;color:var(--d);}
.favBtn:hover{border-color:var(--p1);color:var(--p1);}
.favBtn.active{background:rgba(123,44,255,.2);border-color:var(--p1);color:#ffd700;}
.loadMoreBtn{display:block;margin:0 auto 40px;padding:13px 36px;border-radius:40px;background:linear-gradient(135deg,var(--p0),var(--p2));color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;box-shadow:var(--shadow2);transition:all .2s;}
.loadMoreBtn:hover{opacity:.9;transform:translateY(-2px);}
.gameOverlay{position:fixed;inset:0;background:#000;z-index:900;display:none;flex-direction:column;}
.gameOverlay.open{display:flex;}
.gameBar{display:flex;align-items:center;gap:10px;padding:7px 14px;background:rgba(5,0,8,.95);border-bottom:1px solid var(--line);flex-shrink:0;}
.gameBar h3{font-size:13px;font-weight:700;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gameFrame{flex:1;border:none;width:100%;height:100%;}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal.open{display:flex;}
.modalBox{background:rgba(10,4,22,.99);border:1px solid var(--line);border-radius:var(--r);padding:26px;width:min(380px,92vw);backdrop-filter:blur(30px);box-shadow:var(--shadow);}
.modalBox h2{font-size:19px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--w),var(--p1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.modalBox p{font-size:12px;color:var(--d);margin-bottom:18px;}
.formGroup{margin-bottom:12px;}
.formGroup label{font-size:11px;color:var(--d);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;}
.formGroup input{width:100%;background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:10px;padding:10px 13px;color:var(--w);font-size:13px;font-family:inherit;}
.formGroup input:focus{outline:none;border-color:var(--p0);}
.formGroup input::placeholder{color:var(--d);}
.formRow{display:flex;gap:8px;margin-top:4px;}
.errorMsg{color:#ff6b6b;font-size:12px;margin-bottom:8px;display:none;}
.footer{text-align:center;padding:22px;font-size:12px;color:var(--d);}
@media(max-width:600px){.gamesGrid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;padding:0 12px 20px;}.topbar{padding:0 10px;gap:8px;}.coinBadge{display:none;}.levelBadge,.xpBar{display:none;}}
</style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="bg-noise"></div><div class="bg-orb o1"></div><div class="bg-orb o2"></div><div class="bg-orb o3"></div></div>
<div class="toastContainer" id="toastContainer"></div>

<header class="topbar">
  <button class="menuBtn" onclick="openSidebar()" aria-label="Meny"><span></span><span></span><span></span></button>
  <a class="brand" href="#">
    <div class="logo"><div class="spark s2"></div><div class="spark s3"></div>
      <div class="logoInner"><img src="logo.png" alt="Logo" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="logoEmoji" style="display:none">🎮</span></div></div>
    <div class="brandText"><div class="title">Jakobs Spel</div><div class="sub">1 946+ spel</div></div>
  </a>
  <div class="topRight">
    <div class="coinBadge" onclick="openSidebar();setTimeout(function(){switchSideTab('butik');},60)">
      <span>🪙</span><span id="coinDisplay">0</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px">
      <span class="levelBadge" id="levelDisplay">Nivå 1</span>
      <div class="xpBar"><div class="xpBarFill" id="xpFill" style="width:0%"></div></div>
    </div>
    <button class="pill ghost" id="loginBtn" onclick="openLoginModal(false)">🔐 Logga in</button>
    <div id="userInfo" style="display:none;align-items:center;gap:8px;cursor:pointer" onclick="openSidebar();setTimeout(function(){switchSideTab('profil');},60)">
      <div id="userAvatarDisplay" style="width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--p2),var(--p0));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;border:2px solid var(--p1);overflow:hidden;"></div>
      <span style="font-size:12px;color:var(--m);font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="userNameDisplay"></span>
    </div>
  </div>
</header>

<div class="sideOverlay" id="sideOverlay" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">

function doLogin(){
  var u=document.getElementById("loginUser").value.trim();
  var p=document.getElementById("loginPass").value;
  var mode=document.getElementById("loginModal").dataset.mode;
  var err=document.getElementById("loginError");
  if(!u||!p){err.textContent="Fyll i alla fält";err.style.display="block";return;}
  if(mode==="reg"){
    if(localStorage.getItem("acc_"+u)){err.textContent="Användarnamn taget";err.style.display="block";return;}
    localStorage.setItem("acc_"+u,btoa(p));
    loadState(u);state.user=u;state.isAdmin=false;
    localStorage.setItem("lastUser",u);
    addCoins(50,"Välkomstbonus!");
    toast("Välkommen, "+u+"! +50 mynt");
  }else{
    if(localStorage.getItem("banned_"+u)){err.textContent="Ditt konto är bannat";err.style.display="block";return;}
    var stored=localStorage.getItem("acc_"+u);
    if(!stored||stored!==btoa(p)){err.textContent="Fel användarnamn eller lösenord";err.style.display="block";return;}
    loadState(u);state.user=u;
    state.isAdmin=(btoa(btoa(p))===ADMINPW);
    localStorage.setItem("lastUser",u);
    toast("Välkommen tillbaka, "+u+"!");
  }
  closeLoginModal();
  finishLogin();
}

  if(state.user)addCoins(5,"Skickade förslag");
}

function adminBroadcast(){var msg=document.getElementById('adminBroadcastMsg');if(!msg||!msg.value.trim())return toast('Skriv ett meddelande','error');var msgs=JSON.parse(localStorage.getItem('globalChat')||'[]');msgs.push({user:'[ADMIN]',text:'📢 '+msg.value.trim(),ts:Date.now(),isAdmin:true});localStorage.setItem('globalChat',JSON.stringify(msgs));msg.value='';toast('Broadcast skickat!','ok');if(document.getElementById('chatMessages'))loadChatMsgs();}
function adminGiveCoins(){var uEl=document.getElementById('adminCoinUser');var aEl=document.getElementById('adminCoinAmount');if(!uEl||!aEl||!uEl.value.trim())return toast('Ange ett användarnamn','error');var amount=parseInt(aEl.value)||0;if(amount<=0)return toast('Ange ett giltigt antal mynt','error');if(uEl.value.trim()===state.user){state.coins+=amount;saveState();updateHUD();}else{var key='jspel_'+uEl.value.trim();var data=JSON.parse(localStorage.getItem(key)||'{}');data.coins=(data.coins||0)+amount;localStorage.setItem(key,JSON.stringify(data));}toast(amount+' mynt gavs till '+uEl.value.trim(),'ok');uEl.value='';aEl.value='';renderAdminPanel();}
function adminKick(u){if(u===state.user)return toast('Kan inte kicka dig själv','error');toast(u+' kickades','ok');}
function adminBan(u){if(u===state.user)return toast('Kan inte banna dig själv','error');var banned=JSON.parse(localStorage.getItem('bannedUsers')||'[]');if(banned.indexOf(u)<0){banned.push(u);localStorage.setItem('bannedUsers',JSON.stringify(banned));}toast(u+' bannades','ok');renderAdminPanel();}
function adminUnban(u){var banned=JSON.parse(localStorage.getItem('bannedUsers')||'[]');var idx=banned.indexOf(u);if(idx>=0){banned.splice(idx,1);localStorage.setItem('bannedUsers',JSON.stringify(banned));}toast(u+' avbannades','ok');renderAdminPanel();}
function adminClearChat(){if(!confirm('Rensa all chatt?'))return;localStorage.setItem('globalChat','[]');toast('Chatten rensades','ok');renderAdminPanel();if(document.getElementById('chatMessages'))loadChatMsgs();}
function addAnnouncement(){var inp=document.getElementById('adminAnnounceInput');if(!inp||!inp.value.trim())return toast('Skriv ett tillkännagivande','error');var ann=JSON.parse(localStorage.getItem('admin_announcements')||'[]');ann.unshift(inp.value.trim());if(ann.length>10)ann.pop();localStorage.setItem('admin_announcements',JSON.stringify(ann));inp.value='';toast('Tillagt','ok');renderAdminPanel();}
function removeAnnouncement(i){var ann=JSON.parse(localStorage.getItem('admin_announcements')||'[]');ann.splice(i,1);localStorage.setItem('admin_announcements',JSON.stringify(ann));toast('Borttaget','ok');renderAdminPanel();}
function handleAvatarUpload(input){if(!input.files||!input.files[0])return;var file=input.files[0];if(!file.type.startsWith('image/')){toast('Bara bildfiler är tillåtna','error');return;}if(file.size>2097152){toast('Bilden är för stor (max 2MB)','error');return;}var reader=new FileReader();reader.onload=function(e){var b64=e.target.result;localStorage.setItem('avatar_'+state.user,b64);var ud=document.getElementById('userAvatarDisplay');if(ud)ud.src=b64;toast('Profilbild uppdaterad!','ok');renderProfilePanel();};reader.readAsDataURL(file);}
function claimQuest(id){var today=new Date().toDateString();var key='quests_'+state.user+'_'+today;var saved=JSON.parse(localStorage.getItem(key)||'{"claimed":[]}');if(!saved.claimed)saved.claimed=[];if(saved.claimed.indexOf(id)>=0)return toast('Quest redan hämtad!','error');var quests=getQuests();var q=quests.find(function(q){return q.id===id;});if(!q||!q.done)return toast('Quest ej klar!','error');saved.claimed.push(id);localStorage.setItem(key,JSON.stringify(saved));addCoins(q.reward);toast('+'+q.reward+' mynt! Quest klar!','ok');renderQuestsPanel();}
function applyTheme(name){var themes={purple:{"--p0":"#7b2cff","--p1":"#b56cff","--p2":"#3a00b7","--bg0":"#050008","--bg1":"#0b0014","--bg2":"#120022"},neon:{"--p0":"#00ffcc","--p1":"#00e5ff","--p2":"#007a5e","--bg0":"#000a08","--bg1":"#00150f","--bg2":"#001a10"},gold:{"--p0":"#ffaa00","--p1":"#ffd166","--p2":"#a06800","--bg0":"#0a0600","--bg1":"#130900","--bg2":"#1a0d00"},red:{"--p0":"#ff2d55","--p1":"#ff6b6b","--p2":"#8b0000","--bg0":"#080003","--bg1":"#100008","--bg2":"#160005"},blue:{"--p0":"#2979ff","--p1":"#82b1ff","--p2":"#0040ca","--bg0":"#000510","--bg1":"#000a1f","--bg2":"#000e2b"},pink:{"--p0":"#e91e8c","--p1":"#ff80c8","--p2":"#9c006a","--bg0":"#08000a","--bg1":"#120010","--bg2":"#180015"}};var t=themes[name]||themes.purple;var r=document.documentElement;Object.keys(t).forEach(function(k){r.style.setProperty(k,t[k]);});var p0=t['--p0'];document.querySelectorAll('[class*="bg-orb"]').forEach(function(el,i){if(i===0)el.style.background='radial-gradient(circle,'+p0+'44,transparent 70%)';else if(i===1)el.style.background='radial-gradient(circle,'+p0+'33,transparent 70%)';else el.style.background='radial-gradient(circle,'+p0+'22,transparent 70%)';});document.querySelectorAll('.bg-grid').forEach(function(el){el.style.backgroundImage='linear-gradient('+p0+'18 1px,transparent 1px),linear-gradient(90deg,'+p0+'18 1px,transparent 1px)';});state.settings.theme=name;localStorage.setItem('jspel_'+state.user,JSON.stringify({coins:state.coins,xp:state.xp,level:state.level,favorites:state.favorites,gamesPlayed:state.gamesPlayed,settings:state.settings}));}
document.addEventListener("DOMContentLoaded",function(){
  document.querySelectorAll(".filterBtn").forEach(function(btn){
    btn.addEventListener("click",function(){
      document.querySelectorAll(".filterBtn").forEach(function(b){b.classList.remove("active");});
      this.classList.add("active");state.filterCat=this.dataset.filter;state.page=0;renderGames();
    });
  });
  document.getElementById("searchInput").addEventListener("input",function(){
    state.search=this.value;state.page=0;renderGames();
    if(this.value.length===1)updateQuests("search");
  });
  document.getElementById("loadMoreBtn").addEventListener("click",function(){state.page++;renderGames();});
  document.getElementById("gamesGrid").addEventListener("click",function(e){
    var fb=e.target.closest(".favBtn");if(fb){e.stopPropagation();toggleFav(parseInt(fb.dataset.idx));return;}
    var card=e.target.closest(".gameCard");if(!card)return;
    var idx=parseInt(card.dataset.idx);
    if(gameIsLocked(idx)){if(confirm("Lås upp för 10 mynt?"))unlockGame(idx);}else openGame(idx);
  });
  document.getElementById("panel_favoriter").addEventListener("click",function(e){
    var item=e.target.closest(".favItem");if(item){openGame(parseInt(item.dataset.idx));closeSidebar();}
  });
  var lastUser=localStorage.getItem("lastUser");
  if(lastUser&&localStorage.getItem("acc_"+lastUser)&&!localStorage.getItem("banned_"+lastUser)){
    loadState(lastUser);state.user=lastUser;
    var storedPw=localStorage.getItem("acc_"+lastUser);
    state.isAdmin=(storedPw&&btoa(storedPw)===ADMINPW);
    finishLogin();
  }else{
    renderGames();
    switchSideTab("favoriter");
  }
  if(state.settings&&state.settings.theme&&state.settings.theme!=="purple")applyTheme(state.settings.theme);
  setInterval(function(){
    if(document.getElementById("chatOverlay").classList.contains("open"))loadChatMsgs();
    var bc=JSON.parse(localStorage.getItem("broadcast")||"null");
    if(bc&&bc.ts&&Date.now()-bc.ts<10000&&state.user){
    }
  },3000);
});

</script>
